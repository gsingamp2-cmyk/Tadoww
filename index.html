<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Consistency Tracker</title>
    <link rel="stylesheet" href="index.css">
</head>

<body class="loginPage">

<nav class="autoHideNavbarMain">
    <div class="autoHideNavbarInner">

        <div class="navbarBrandLogoArea">
            Consistify
        </div>

        <div class="navbarRightMenuArea">
            <button class="navbarMenuButtonHome">Home</button>
            <button class="navbarMenuButtonAbout">About</button>
            <button class="navbarMenuButtonFaq">FAQs</button>
            <button class="navbarMenuButtonLogin">Login</button>
        </div>

    </div>
</nav>

<div class="homepageContentContainer">

    <h1 class="homepageHeadingMain">
        Track Your Consistency
    </h1>

    <p class="homepageSubtitleText">
        Build habits. Stay consistent. Visualize your growth.
    </p>

    <div class="homepageLoginSectionWrapper">

        <button class="homepageGoogleLoginButton">
            <img src="https://developers.google.com/identity/images/g-logo.png" class="googleIcon">
            Login with Google
        </button>

        <div class="loginDividerLine">
            <span>OR</span>
        </div>

        <div class="homepageLoginBoxContainer">

            <input type="text"
                   placeholder="Username"
                   class="homepageLoginUsernameInput">

            <input type="password"
                   placeholder="Password"
                   class="homepageLoginPasswordInput">

            <button class="homepageLoginSubmitButton">
                Login
            </button>

            <p class="homepageForgotPasswordText">
                Forgot Password?
            </p>

        </div>

    </div>

</div>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js"></script>
<script src="index.js"></script>

</body>
</html>
